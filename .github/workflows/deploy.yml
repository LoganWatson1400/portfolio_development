name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch roadmap skills
        run: python roadmap.py loganwatson

      - name: Move JSON to src/lib/data
        run: mv loganwatson_roadmap.json src/lib/data/skills.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - name: Deploy to loganwatson1400.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: loganwatson1400/loganwatson1400.github.io
          publish_branch: main
          publish_dir: ./build
